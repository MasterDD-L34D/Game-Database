name: Backend and Frontend Tests

on:
  push:
    paths:
      - 'server/**'
      - 'apps/dashboard/**'
      - '.github/workflows/backend-and-frontend-tests.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'apps/dashboard/**'
      - '.github/workflows/backend-and-frontend-tests.yml'

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        working-directory: server
        run: npm ci
      - name: Run backend tests
        working-directory: server
        run: npm test
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Run dashboard targeted tests
        working-directory: apps/dashboard
        run: npm test -- --run src/features/records/components/__tests__/RecordTable.test.tsx src/features/records/pages/__tests__/RecordDetailsPage.test.tsx src/features/records/pages/__tests__/RecordEditPage.test.tsx src/features/taxonomies/pages/__tests__/TraitListPage.test.tsx src/features/taxonomies/pages/__tests__/TaxonomyCrudPages.test.tsx src/features/taxonomies/pages/__tests__/TaxonomyDetailsPages.test.tsx src/features/taxonomies/pages/__tests__/TaxonomyRelationPages.test.tsx src/components/data-table/__tests__/DataTable.test.tsx

  search-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: game
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/game?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        working-directory: server
        run: npm ci
      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate
      - name: Apply migrations
        working-directory: server
        run: npx prisma migrate deploy
      - name: Seed database
        working-directory: server
        run: npx prisma db seed
      - name: Backfill v1.0.0 snapshots
        working-directory: server
        run: node scripts/backfill-v1-snapshots.js
      - name: Run fuzzy-search DB smoke
        working-directory: server
        run: node -e "require('./test/search.db.test.js')"
      - name: Run taxonomy-version DB tests
        working-directory: server
        run: node -e "require('./test/taxonomyVersion.db.test.js')"
      - name: Run taxonomy-version lifecycle DB tests
        working-directory: server
        run: node -e "require('./test/taxonomyVersions.db.test.js')"
