name: Backend and Frontend Tests

on:
  push:
    paths:
      - 'server/**'
      - 'apps/dashboard/**'
      - '.github/workflows/backend-and-frontend-tests.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'apps/dashboard/**'
      - '.github/workflows/backend-and-frontend-tests.yml'

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        working-directory: server
        run: npm ci
      - name: Run backend tests
        working-directory: server
        run: npm test
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Run dashboard targeted tests
        working-directory: apps/dashboard
        run: npm test -- --run src/features/records/components/__tests__/RecordTable.test.tsx src/features/records/pages/__tests__/RecordDetailsPage.test.tsx src/features/records/pages/__tests__/RecordEditPage.test.tsx src/features/taxonomies/pages/__tests__/TraitListPage.test.tsx src/features/taxonomies/pages/__tests__/TaxonomyCrudPages.test.tsx src/features/taxonomies/pages/__tests__/TaxonomyDetailsPages.test.tsx src/components/data-table/__tests__/DataTable.test.tsx
