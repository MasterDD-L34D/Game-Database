name: Playwright E2E

on:
  push:
    paths:
      - 'server/**'
      - 'apps/dashboard/**'
      - '.github/workflows/playwright-e2e.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'apps/dashboard/**'
      - '.github/workflows/playwright-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: game
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/game?schema=public
      PORT: 3333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        working-directory: server
        run: npm ci
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Bootstrap database
        working-directory: server
        run: npm run dev:setup
      - name: Install Playwright browser
        working-directory: apps/dashboard
        run: npx playwright install --with-deps chromium
      - name: Start backend
        working-directory: server
        run: nohup npm run dev > ../backend.log 2>&1 &
      - name: Start dashboard
        working-directory: apps/dashboard
        run: nohup npm run dev -- --host 127.0.0.1 > ../dashboard.log 2>&1 &
      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3333/health >/dev/null && curl -fsS http://127.0.0.1:5174 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not start in time"
          exit 1
      - name: Run Playwright suite
        working-directory: apps/dashboard
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/dashboard/playwright-report
            apps/dashboard/test-results
            backend.log
            apps/dashboard.log
