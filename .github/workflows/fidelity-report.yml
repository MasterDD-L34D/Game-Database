name: "Fidelity Report (RFC #4 S1b)"

# On-demand shadow fidelity report: rebuild the DB from the Game checkout
# (evo:import, i18n-aware after #185), release a snapshot, export it back
# (evo:export, #187) report-only and diff against the same checkout. The
# resulting report measures pure representation loss (model-gap). Per the RFC #4
# S2 amendment (2026-06-18) species export is fidelity-shadow ONLY, so this runs
# WITHOUT --out (no shipping-mode overlay) -- the shippable bundle + green-gate
# live in taxonomy-export.yml. Read-only vs Game; ephemeral CI Postgres; no repo
# writes -- the report is a run artifact (docs/rfc/2026-06-11-bidirectional-sync.md).

on:
  workflow_dispatch:

jobs:
  fidelity:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: game
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/game?schema=public

    steps:
      - name: Checkout Game-Database
        uses: actions/checkout@v4

      - name: Checkout Game repo
        uses: actions/checkout@v4
        with:
          repository: MasterDD-L34D/Game
          path: _game

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd server && npm ci

      - name: Bootstrap database (schema only, NO seed)
        # Codex P2 on PR #188: dev:setup runs the Prisma seed, and the importer
        # only upserts -- seeded slugs absent from the Game checkout would
        # survive into the snapshot and pollute the report as exported_only.
        # The fidelity run must start from an EMPTY taxonomy DB so the diff
        # measures pure import/export representation loss.
        run: cd server && npx prisma generate && npx prisma migrate deploy

      - name: Import taxonomy from Game checkout
        # --no-setup is LOAD-BEARING: the evo-import.js wrapper otherwise runs
        # dev:setup (generate + deploy + PRISMA SEED + v1 backfill) before the
        # import -- the seed re-entered through this door even after #188 made
        # the Bootstrap step schema-only (root cause of seed traits like
        # body-length leaking into every export target with null membership).
        run: cd server && npm run evo:import -- --no-setup --repo ${{ github.workspace }}/_game

      - name: Release fidelity snapshot
        working-directory: server
        # Mirrors the POST /:tag/release semantics with the SAME shared
        # snapshot writer (snapshotAllMasters); audit row intentionally
        # skipped (ephemeral CI DB, no request context).
        run: |
          node -e "
          const prisma = require('./db/prisma');
          const { snapshotAllMasters } = require('./utils/versionSnapshot');
          (async () => {
            const tag = 'v0.0.0-fidelity-${{ github.run_id }}';
            const v = await prisma.taxonomyVersion.create({ data: { tag, status: 'draft' } });
            await prisma.\$transaction(async (tx) => {
              await tx.taxonomyVersion.update({ where: { id: v.id }, data: { status: 'released', releasedAt: new Date(), releasedBy: 'fidelity-ci' } });
              const counts = await snapshotAllMasters(tx, v.id, (m) => console.log(m));
              console.log('snapshot counts:', JSON.stringify(counts));
            });
            console.log('released', tag);
            await prisma.\$disconnect();
          })().catch((e) => { console.error(e); process.exit(1); });
          "

      - name: Export and diff against Game checkout (report-only, raw shadow)
        working-directory: server
        # Report-only (NO --out): RFC #4 S2 amendment (2026-06-18) rescoped species
        # export to fidelity-shadow. Raw mode skips the species shipping-mode
        # transforms (overlay / marker / template-faithful, gated on --out), so the
        # report measures pure representation loss -- MODEL_GAP fields (description,
        # last_synced_at) classify as game_only_model_gap, not matching. The
        # shippable bundle now lives in taxonomy-export.yml (--out + green-gate).
        run: npm run evo:export -- --version v0.0.0-fidelity-${{ github.run_id }} --diff ${{ github.workspace }}/_game --report ${{ github.workspace }}/fidelity-report.json

      - name: Print summary
        run: |
          jq '{version, generatedAt, fieldInventory, targets: (.targets | map_values({counts, targetMissing: (.targetMissing // false)}))}' fidelity-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-report
          path: fidelity-report.json
          retention-days: 30
